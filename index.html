<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistência Pro - Gestão Inteligente</title>
    <link id="manifest-link" rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    <script>
      // Dynamically set manifest based on URL
      const manifestLink = document.getElementById('manifest-link');
      if (window.location.pathname.includes('motoboy')) {
        manifestLink.href = '/manifest-motoboy.json';
      } else if (window.location.pathname.startsWith('/s/')) {
        manifestLink.href = '/manifest.json';
      } else {
        manifestLink.href = '/manifest-admin.json';
      }
    </script>
  </head>
  <body>
    
    <script>
      (function() {
        // Configuration for loading screen
        const isMotoboy = window.location.pathname.includes('motoboy');
        const isPublicStorefront = window.location.pathname.startsWith('/s/');
        const bg = document.getElementById('loading-bg');
        const spinner = document.getElementById('loading-spinner');
        const icon = document.getElementById('loading-icon');
        const title = document.getElementById('loading-title');
        const subtitle = document.getElementById('loading-subtitle');
        const bar = document.getElementById('loading-bar');
        const mLink = document.getElementById('manifest-link');


        // Handle broken icons
        icon.onerror = function() {
          this.style.display = 'none';
          spinner.classList.add('border-opacity-50');
        };

        // Simulate progress
        let progress = 0;
        const interval = setInterval(() => {
          progress += Math.random() * 15;
          if (progress > 90) progress = 90;
          if (bar) bar.style.width = progress + '%';
        }, 150);

        // Function to hide loading screen
        function hideLoading() {
          clearInterval(interval);
          if (bar) bar.style.width = '100%';
          setTimeout(() => {
            const screen = document.getElementById('loading-screen');
            if (screen) {
              screen.style.opacity = '0';
              setTimeout(() => screen.remove(), 500);
            }
          }, 200);
        }

        // Hide loading screen when React is ready or after timeout
        window.addEventListener('load', hideLoading);
        
        // Safety timeout: hide after 8 seconds no matter what
        setTimeout(hideLoading, 8000);
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
