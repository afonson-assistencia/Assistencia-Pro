<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistência Pro - Gestão Inteligente</title>
    <link id="manifest-link" rel="manifest" href="/manifest-admin.json" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/logo.png" />
    <script>
      // Dynamically set manifest based on URL as early as possible
      (function() {
        const manifestLink = document.getElementById('manifest-link');
        const path = window.location.pathname;
        if (path.includes('motoboy')) {
          manifestLink.href = '/manifest-motoboy.json';
        } else if (path.startsWith('/s/')) {
          manifestLink.href = '/manifest.json';
        } else {
          manifestLink.href = '/manifest-admin.json';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
            
            // Check for updates periodically
            setInterval(() => {
              registration.update();
            }, 60 * 60 * 1000); // Every hour

            registration.onupdatefound = () => {
              const installingWorker = registration.installing;
              if (installingWorker) {
                installingWorker.onstatechange = () => {
                  if (installingWorker.state === 'installed') {
                    if (navigator.serviceWorker.controller) {
                      // New content is available, show notification or reload
                      console.log('New content available, please refresh.');
                      if (window.confirm('Uma nova versão do sistema está disponível. Deseja atualizar agora?')) {
                        window.location.reload();
                      }
                    }
                  }
                };
              }
            };
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });

        // Reload when the new service worker takes over
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      }
    </script>
  </body>
</html>
