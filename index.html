<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assistência Pro - Gestão Inteligente</title>
    <link id="manifest-link" rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1048/1048953.png" />
    <script>
      // Dynamically set manifest based on URL
      const manifestLink = document.getElementById('manifest-link');
      if (window.location.pathname.includes('motoboy')) {
        manifestLink.href = '/manifest-motoboy.json';
      } else {
        manifestLink.href = '/manifest-admin.json';
      }
    </script>
  </head>
  <body class="bg-[#020617]">
    <div id="loading-screen" class="fixed inset-0 z-[9999] flex flex-col items-center justify-center transition-opacity duration-500">
      <div id="loading-bg" class="absolute inset-0 bg-[#020617]"></div>
      <div class="relative flex flex-col items-center gap-6">
        <div id="loading-logo-container" class="relative">
          <div id="loading-spinner" class="h-24 w-24 rounded-full border-4 border-t-transparent animate-spin"></div>
          <div class="absolute inset-0 flex items-center justify-center">
            <img id="loading-icon" src="" alt="Logo" class="h-12 w-12 rounded-lg object-cover shadow-lg" />
          </div>
        </div>
        <div class="flex flex-col items-center gap-2">
          <h1 id="loading-title" class="text-2xl font-bold tracking-tight text-white">Assistência Pro</h1>
          <p id="loading-subtitle" class="text-sm font-medium text-slate-400">Carregando ambiente seguro...</p>
        </div>
        <div class="w-48 h-1.5 bg-slate-800 rounded-full overflow-hidden">
          <div id="loading-bar" class="h-full w-0 bg-blue-500 transition-all duration-300"></div>
        </div>
      </div>
    </div>

    <script>
      (function() {
        // Configuration for loading screen
        const isMotoboy = window.location.pathname.includes('motoboy');
        const bg = document.getElementById('loading-bg');
        const spinner = document.getElementById('loading-spinner');
        const icon = document.getElementById('loading-icon');
        const title = document.getElementById('loading-title');
        const subtitle = document.getElementById('loading-subtitle');
        const bar = document.getElementById('loading-bar');
        const mLink = document.getElementById('manifest-link');

        if (isMotoboy) {
          // Motoboy Theme (Yellow/Orange/Black)
          bg.style.backgroundColor = '#000000';
          spinner.style.borderColor = '#facc15'; // yellow-400
          spinner.style.borderTopColor = 'transparent';
          icon.src = 'https://img.freepik.com/premium-photo/delivery-man-scooter-express-food-delivery-around-city-yellow-background-delivery-fast-high-speed-ai-generation_235573-2619.jpg';
          title.innerText = 'Motoboy Pro';
          title.style.color = '#facc15';
          subtitle.innerText = 'Preparando suas entregas...';
          subtitle.style.color = '#a1a1aa';
          bar.style.backgroundColor = '#facc15';
          if (mLink) mLink.href = '/manifest-motoboy.json';
        } else {
          // Admin Theme (Blue/Slate)
          bg.style.backgroundColor = '#020617';
          spinner.style.borderColor = '#3b82f6'; // blue-500
          spinner.style.borderTopColor = 'transparent';
          icon.src = 'https://cdn-icons-png.flaticon.com/512/1048/1048953.png';
          title.innerText = 'Assistência Pro';
          subtitle.innerText = 'Carregando painel administrativo...';
          bar.style.backgroundColor = '#3b82f6';
          if (mLink) mLink.href = '/manifest-admin.json';
        }

        // Handle broken icons
        icon.onerror = function() {
          this.style.display = 'none';
          spinner.classList.add('border-opacity-50');
        };

        // Simulate progress
        let progress = 0;
        const interval = setInterval(() => {
          progress += Math.random() * 15;
          if (progress > 90) progress = 90;
          if (bar) bar.style.width = progress + '%';
        }, 150);

        // Function to hide loading screen
        function hideLoading() {
          clearInterval(interval);
          if (bar) bar.style.width = '100%';
          setTimeout(() => {
            const screen = document.getElementById('loading-screen');
            if (screen) {
              screen.style.opacity = '0';
              setTimeout(() => screen.remove(), 500);
            }
          }, 200);
        }

        // Hide loading screen when React is ready or after timeout
        window.addEventListener('load', hideLoading);
        
        // Safety timeout: hide after 8 seconds no matter what
        setTimeout(hideLoading, 8000);
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
